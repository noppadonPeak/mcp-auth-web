<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock OAuth Provider</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div id="app" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <div v-if="!redirectUri" class="text-center">
            <div class="text-red-500 text-5xl mb-4">⚠️</div>
            <h1 class="text-xl font-bold text-slate-800">Invalid Request</h1>
            <p class="text-slate-500 mt-2">หน้านี้ต้องถูกเรียกมาจาก MCP Server พร้อมพารามิเตอร์ที่ถูกต้อง</p>
        </div>

        <div v-else>
            <header class="text-center mb-8">
                <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Mock Auth Service</h1>
                <p class="text-slate-500 mt-1">ยินดีต้อนรับ! กรุณาเข้าสู่ระบบ</p>
            </header>

            <form @submit.prevent="handleLogin" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อผู้ใช้งาน (Username)</label>
                    <input v-model="username" type="text" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition" placeholder="admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน (Password)</label>
                    <input v-model="password" type="password" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition" placeholder="1234">
                </div>

                <div class="bg-blue-50 p-4 rounded-lg text-sm text-blue-700 border border-blue-100 mb-4">
                    <p><strong>App:</strong> {{ clientId }}</p>
                    <p><strong>Redirect:</strong> {{ redirectUri }}</p>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition transform active:scale-95">
                    Login and Authorize
                </button>
            </form>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const username = ref('admin');
                const password = ref('1234');
                const redirectUri = ref('');
                const clientId = ref('');
                const sessionId = ref('');

                onMounted(() => {
                    const params = new URLSearchParams(window.location.search);
                    redirectUri.value = params.get('redirect_uri');
                    clientId.value = params.get('client_id');
                    sessionId.value = params.get('session_id');

                });

                const handleLogin = () => {
                    // ในระบบจริงต้องตรวจสอบ Username/Password กับ DB
                    // แต่ที่นี่เราจะ Redirect กลับทันทีพร้อม Random Code
                    const randomCode = Math.random().toString(36).substring(7);
                    const finalUrl = `${redirectUri.value}?code=${randomCode}&session_id=${sessionId.value}`;
                    
                    window.location.href = finalUrl;
                };

                return { username, password, redirectUri, clientId, sessionId,  handleLogin };
            }
        }).mount('#app');
    </script>
</body>
</html>
