<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Login (PKCE Ready)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #fafafa; }
        .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; width: 320px; border: 1px solid #eaeaea; }
        h2 { margin-bottom: 0.5rem; color: #1a1a1a; }
        p { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
        button { background: #1a1a1a; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: 500; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .footer { margin-top: 1.5rem; font-size: 11px; color: #999; }
    </style>
</head>
<body>
    <div id="app">
        <div class="card">
            <h2>MCP Access</h2>
            <p>ยินดีต้อนรับ! <br>กรุณายืนยันการเข้าถึงสำหรับ AI Client</p>
            <button @click="handleLogin">ยืนยันและอนุญาต</button>
            <div class="footer">
                Secure OAuth 2.0 with PKCE Protection
            </div>
        </div>
    </div>

    <script>
        const { createApp, onMounted, ref } = Vue;

        createApp({
            setup() {
                const state = ref('');
                const clientId = ref('');
                const redirectUri = ref('');

                onMounted(() => {
                    const params = new URLSearchParams(window.location.search);
                    state.value = params.get('state');
                    clientId.value = params.get('client_id');
                    redirectUri.value = params.get('redirect');
                });

                const handleLogin = () => {
                    if (!redirectUri.value || !state.value) {
                        alert("ข้อมูลไม่ครบถ้วน (Missing state or redirect)");
                        return;
                    }

                    // สร้าง Temporary Authorization Code
                    const authCode = "auth_" + Math.random().toString(36).substr(2, 12);
                    
                    // ส่งกลับไปยัง Client ตามมาตรฐาน OAuth
                    const callbackUrl = new URL(redirectUri.value);
                    callbackUrl.searchParams.set('code', authCode);
                    callbackUrl.searchParams.set('state', state.value);
                    callbackUrl.searchParams.set('code_verifier', "codeChallenge-fair");
                    callbackUrl.searchParams.set('client_id', clientId.value);

                    window.location.href = callbackUrl.toString();
                };

                return { handleLogin, state };
            }
        }).mount('#app');
    </script>
</body>
</html>
